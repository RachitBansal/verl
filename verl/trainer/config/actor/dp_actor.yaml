# Format checks enforced on CI:
# 1. Comments must appear above each field.
# 2. There must be a blank line between each field.
# 3. Inline comments (after a field on the same line) are not allowed.
# 4. Indentation level is respected for nested fields.

# defaults specify the default config from each component
defaults:

  # fsdp optimizer config
  - ../optim@optim: fsdp

  # fsdp engine config
  - ../engine@fsdp_config: fsdp

  # dp actor config, inheriting from trainer/config/actor/actor.yaml
  - actor

  # load the reference default config, then apply the fields in the current yaml
  - _self_

# Target class for this configuration
_target_: verl.workers.config.FSDPActorConfig

# TODO(haibin.lin): switch to fsdp2
strategy: fsdp

# Gradient clipping for actor updates, specific to the strategy.
grad_clip: 1.0

# Sequence parallelism size for Ulysses-style model parallelism
# oc.select: the default val for ref.ulysses_sequence_parallel_size
ulysses_sequence_parallel_size: 1

# calculate entropy with chunking to reduce memory peak
entropy_from_logits_with_chunking: False

# recompute entropy
entropy_checkpointing: False

# Whether to remove padding tokens in inputs during training
use_remove_padding: ${oc.select:actor_rollout_ref.model.use_remove_padding,false}

# Second optimizer for the parallel_avg combined-training mode.
# When left null (default), there is only one optimizer — behavior is unchanged from vanilla RL
# or fused-combined mode. When set, a second AdamW with its own (m, v) state and its own
# learning rate is built for the SFT side; the per-step parameter update becomes the average
# of the two independent Adam updates ("average of two models").
# Under parallel_avg, sft_config.rl_loss_weight / sft_config.sft_loss_weight are ignored.
sft_optim: null

# Aggregation for the SFT NLL loss (pure-SFT / fused-combined / parallel_avg SFT sides).
# Default "token-sum" matches legacy behavior. Switching to "token-mean" primarily helps in the
# fused-combined mode, where otherwise the shared Adam v is dominated by SFT's ~1e4 magnitudes
# and the RL direction gets drowned in v's denominator.
sft_loss_agg_mode: token-sum