# Checkpoint registry for lm_eval_harness evaluations
# All checkpoints are OLMo2-1B, HuggingFace format
#
# pt_step: pretraining step (on 50B token run, 2M tokens/step)
# For SFT/RL: pt_step = base model pretraining step before fine-tuning

base_dir: /n/netscratch/dam_lab/Everyone/rl_pretrain

# ─── Base Models ──────────────────────────────────────────────────────────────
# OLMo2-1B pretrained on 50B tokens (stage1), converted to HF at each step
base:
  description: "OLMo2-1B base pretrained checkpoints (stage1, 50B tokens)"
  checkpoints:
    - pt_step: 1000
      path: /n/netscratch/dam_lab/Everyone/rl_pretrain/OLMo2-1B-stage1-50B/step1000-hf
    - pt_step: 2000
      path: /n/netscratch/dam_lab/Everyone/rl_pretrain/OLMo2-1B-stage1-50B/step2000-hf
    - pt_step: 3000
      path: /n/netscratch/dam_lab/Everyone/rl_pretrain/OLMo2-1B-stage1-50B/step3000-hf
    - pt_step: 5000
      path: /n/netscratch/dam_lab/Everyone/rl_pretrain/OLMo2-1B-stage1-50B/step5000-hf
    - pt_step: 6000
      path: /n/netscratch/dam_lab/Everyone/rl_pretrain/OLMo2-1B-stage1-50B/step6000-hf
    - pt_step: 7000
      path: /n/netscratch/dam_lab/Everyone/rl_pretrain/OLMo2-1B-stage1-50B/step7000-hf
    - pt_step: 10000
      path: /n/netscratch/dam_lab/Everyone/rl_pretrain/OLMo2-1B-stage1-50B/step10000-hf
    - pt_step: 14000
      path: /n/netscratch/dam_lab/Everyone/rl_pretrain/OLMo2-1B-stage1-50B/step14000-hf
    - pt_step: 22000
      path: /n/netscratch/dam_lab/Everyone/rl_pretrain/OLMo2-1B-stage1-50B/step22000-hf

# ─── SFT Models ───────────────────────────────────────────────────────────────
# SFT on OpenMathInstruct-2 GSM8K (repeated, multi-solution), 50k SFT steps
# Experiment name pattern: OLMo2-1B_step{pt_step}_interleave_twoloader_n32_sft_50000_ppo_0_rgsm
# Each uses the last saved HF checkpoint under hf_model/
sft:
  description: "SFT on OMI-GSM8K (rgsm, repeated multi-solution), 50k steps, last checkpoint"
  training_data: /n/netscratch/dam_lab/Everyone/rl_pretrain/data/openmathinstruct2_gsm8k_duplicated/train_gsm8k.parquet
  checkpoints:
    - pt_step: 1000
      sft_step: 9500
      path: /n/netscratch/dam_lab/Everyone/rl_pretrain/experiments/OLMo2-1B_step1000_interleave_twoloader_n32_sft_50000_ppo_0_rgsm/hf_model/step9500
    - pt_step: 2000
      sft_step: 9500
      path: /n/netscratch/dam_lab/Everyone/rl_pretrain/experiments/OLMo2-1B_step2000_interleave_twoloader_n32_sft_50000_ppo_0_rgsm/hf_model/step9500
    - pt_step: 3000
      sft_step: 9500
      path: /n/netscratch/dam_lab/Everyone/rl_pretrain/experiments/OLMo2-1B_step3000_interleave_twoloader_n32_sft_50000_ppo_0_rgsm/hf_model/step9500
    - pt_step: 5000
      sft_step: 9500
      path: /n/netscratch/dam_lab/Everyone/rl_pretrain/experiments/OLMo2-1B_step5000_interleave_twoloader_n32_sft_50000_ppo_0_rgsm/hf_model/step9500
    - pt_step: 6000
      sft_step: 9500
      path: /n/netscratch/dam_lab/Everyone/rl_pretrain/experiments/OLMo2-1B_step6000_interleave_twoloader_n32_sft_50000_ppo_0_rgsm/hf_model/step9500
    - pt_step: 7000
      sft_step: 9500
      path: /n/netscratch/dam_lab/Everyone/rl_pretrain/experiments/OLMo2-1B_step7000_interleave_twoloader_n32_sft_50000_ppo_0_rgsm/hf_model/step9500
    - pt_step: 10000
      sft_step: 9500
      path: /n/netscratch/dam_lab/Everyone/rl_pretrain/experiments/OLMo2-1B_step10000_interleave_twoloader_n32_sft_50000_ppo_0_rgsm/hf_model/step9500
    - pt_step: 14000
      sft_step: 14000
      path: /n/netscratch/dam_lab/Everyone/rl_pretrain/experiments/OLMo2-1B_step14000_interleave_twoloader_n32_sft_50000_ppo_0_rgsm/hf_model/step14000
      note: "Different SFT step than others (14000 vs 9500)"
    - pt_step: 22000
      sft_step: 9500
      path: /n/netscratch/dam_lab/Everyone/rl_pretrain/experiments/OLMo2-1B_step22000_interleave_twoloader_n32_sft_50000_ppo_0_rgsm/hf_model/step9500

# ─── RL Models (Direct RL, "Red Stars") ──────────────────────────────────────
# Direct RL on GSM8K via PPO (omigsm8k), n=32 rollouts
# Selected: last RL step, best seed per pretraining checkpoint (Pass@32, temp=0.6)
# These correspond to the red stars in notebooks/plot_eval_results_gsm.py
rl:
  description: "Direct RL on GSM8K (omigsm8k, n=32), best checkpoint per pt_step"
